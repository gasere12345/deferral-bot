services:
  - type: web
    name: deferral-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.bot
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: bot/deferral.db
      - key: PORT
        value: "8080"
